<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(60)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(120)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(180)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,120)"/>
  </g>
  <!-- Logo circle -->
  <circle cx="150" cy="315" r="60" fill="url(#accent)" opacity="0.9"/>
  <text x="150" y="335" text-anchor="middle" fill="white" font-size="48" font-weight="bold" font-family="Inter, system-ui, sans-serif">V</text>
  <!-- Title -->
  <text x="260" y="280" fill="white" font-size="56" font-weight="bold" font-family="Inter, system-ui, sans-serif">VideoGrab</text>
  <text x="260" y="340" fill="white" font-size="32" font-family="Inter, system-ui, sans-serif" opacity="0.8">万能视频下载器</text>
  <!-- Gradient underline -->
  <rect x="260" y="360" width="300" height="4" rx="2" fill="url(#accent)"/>
  <!-- Tags -->
  <text x="260" y="420" fill="#9ca3af" font-size="20" font-family="Inter, system-ui, sans-serif">1800+ 平台  ·  AI 智能总结  ·  字幕提取  ·  思维导图</text>
  <!-- Feature badges -->
  <rect x="260" y="450" width="120" height="36" rx="18" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
  <text x="320" y="474" text-anchor="middle" fill="#a78bfa" font-size="14" font-family="Inter, system-ui, sans-serif">免费使用</text>
  <rect x="396" y="450" width="120" height="36" rx="18" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <text x="456" y="474" text-anchor="middle" fill="#60a5fa" font-size="14" font-family="Inter, system-ui, sans-serif">无需注册</text>
  <rect x="532" y="450" width="120" height="36" rx="18" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <text x="592" y="474" text-anchor="middle" fill="#34d399" font-size="14" font-family="Inter, system-ui, sans-serif">高清下载</text>
  <!-- URL -->
  <text x="260" y="540" fill="#6b7280" font-size="18" font-family="Inter, system-ui, sans-serif">videograb.app</text>
</svg>
